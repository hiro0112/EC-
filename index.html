<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC-app 分析ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header class="app-header">
    <h1>EC-app 分析ダッシュボード</h1>
    <span class="privacy-badge">🔒 データはブラウザ内のみで処理されます（外部送信なし）</span>
  </header>

  <!-- Upload -->
  <section class="upload-section">
    <div id="dropzone" class="dropzone">
      <div class="dropzone-inner">
        <div class="upload-icon">📂</div>
        <p class="upload-text">CSVファイルをドラッグ＆ドロップ</p>
        <p class="upload-sub">または</p>
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">ファイルを選択</button>
        <input type="file" id="file-input" accept=".csv" multiple style="display:none">
        <p class="upload-hint">複数ファイル可 ／ 月次例：楽天・26年５月.csv　週次例：アマゾン・26年5月1日.csv</p>
      </div>
    </div>
  </section>

  <!-- Loaded files list -->
  <section id="files-section" class="files-section hidden">
    <button class="files-header" id="files-toggle">
      <span class="section-label">読み込み済みファイル</span>
      <span id="files-summary" class="files-summary-count"></span>
      <span class="toggle-caret">▶</span>
    </button>
    <div id="files-list" class="files-list hidden"></div>
  </section>

  <!-- Analysis -->
  <section id="analysis-section" class="analysis-section hidden">

    <div class="tabs">
      <button class="tab-btn active" data-tab="1">① 全商品売上</button>
      <button class="tab-btn" data-tab="2">② 商品別売上</button>
      <button class="tab-btn" data-tab="3">③ 在庫分析</button>
      <button class="tab-btn" data-tab="4">④ 週次推移</button>
    </div>

    <!-- Tab 1 -->
    <div class="tab-content active" id="tab-1">
      <div class="controls">
        <label>チャネル
          <select id="t1-channel"><option value="">全チャネル</option></select>
        </label>
        <label>期間
          <select id="t1-period"><option value="">全期間</option></select>
        </label>
      </div>
      <div id="t1-cards" class="summary-cards"></div>
      <div class="chart-wrap">
        <canvas id="chart1"></canvas>
      </div>
    </div>

    <!-- Tab 2 -->
    <div class="tab-content hidden" id="tab-2">
      <div class="controls">
        <label>チャネル
          <select id="t2-channel"><option value="">全チャネル</option></select>
        </label>
        <label>期間
          <select id="t2-period"><option value="">全期間</option></select>
        </label>
        <label>指標
          <select id="t2-metric">
            <option value="amount">売上金額</option>
            <option value="qty">売上数量</option>
          </select>
        </label>
        <label>表示件数
          <select id="t2-topn">
            <option value="10">上位10件</option>
            <option value="20">上位20件</option>
            <option value="50">上位50件</option>
            <option value="0">全件</option>
          </select>
        </label>
        <label>商品検索（複数はカンマ区切り）
          <input type="text" id="t2-search" placeholder="例：クロスメッシュ,スポーツ">
        </label>
      </div>
      <div class="chart-scroll">
        <div class="chart-wrap" id="t2-chart-wrap">
          <canvas id="chart2"></canvas>
        </div>
      </div>
    </div>

    <!-- Tab 3 -->
    <div class="tab-content hidden" id="tab-3">
      <div class="controls">
        <label>チャネル
          <select id="t3-channel"><option value="">全チャネル</option></select>
        </label>
        <label>表示件数
          <select id="t3-topn">
            <option value="20">上位20件</option>
            <option value="50">上位50件</option>
            <option value="100">上位100件</option>
            <option value="0">全件</option>
          </select>
        </label>
        <span id="t3-latest-info" class="latest-info"></span>
        <div class="legend">
          <span class="legend-dot red"></span>1ヶ月未満
          <span class="legend-dot orange"></span>1〜2ヶ月
          <span class="legend-dot yellow"></span>2〜3ヶ月
          <span class="legend-dot green"></span>3ヶ月以上
        </div>
      </div>
      <div class="chart-scroll">
        <div class="chart-wrap" id="t3-chart-wrap">
          <canvas id="chart3"></canvas>
        </div>
      </div>
      <div id="t3-table" class="data-table"></div>
    </div>

    <!-- Tab 4 -->
    <div class="tab-content hidden" id="tab-4">

      <div class="t4-section-title">① 全体売上 週次推移（チャネル別）</div>
      <div class="controls">
        <label>指標
          <select id="t4-metric">
            <option value="amount">売上金額</option>
            <option value="qty">売上数量</option>
          </select>
        </label>
      </div>
      <div class="chart-wrap" id="t4a-chart-wrap">
        <canvas id="chart4a"></canvas>
      </div>

      <div class="t4-section-title" style="margin-top:36px">② 商品別 週次推移</div>
      <div class="controls t4b-controls">
        <div class="ctrl-block">
          <div class="ctrl-label">チャネル</div>
          <div class="cb-group" id="t4-channels"></div>
        </div>
        <div class="ctrl-block">
          <div class="ctrl-label">表示単位</div>
          <label class="cb-label"><input type="radio" name="t4-view" value="total" checked> チャネル合計</label>
          <label class="cb-label"><input type="radio" name="t4-view" value="each"> チャネル別</label>
        </div>
        <div class="ctrl-block">
          <div class="ctrl-label">指標</div>
          <select id="t4-metric2">
            <option value="amount">売上金額</option>
            <option value="qty">売上数量</option>
          </select>
        </div>
        <div class="ctrl-block ctrl-block--wide">
          <div class="ctrl-label">商品を選択（複数選択可）</div>
          <input type="text" id="t4-prod-search" class="prod-search" placeholder="商品名を検索...">
          <div class="cb-group cb-group--scroll" id="t4-products"></div>
        </div>
      </div>
      <div class="chart-wrap" id="t4b-chart-wrap">
        <canvas id="chart4b"></canvas>
      </div>

    </div>

  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
